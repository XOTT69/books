<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧитайКо — Хмарний Трекер</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; transition: background-color 0.3s, color 0.3s; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body.dark { background-color: #0f172a; color: #f8fafc; }
        body.dark .bg-white { background-color: #1e293b; border-color: #334155; }
        body.dark .text-slate-900 { color: #f8fafc; }
        body.dark .text-slate-500 { color: #cbd5e1; }
        body.dark .bg-slate-50, body.dark .bg-slate-100 { background-color: #0f172a; }
        body.dark .border-slate-100, body.dark .border-slate-200 { border-color: #334155; }
        .fade-in { animation: fadeIn 0.2s ease forwards; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(5px); } 100% { opacity: 1; transform: translateY(0); } }
        .bottom-sheet { transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); border-radius: 24px 24px 0 0; }
        .bottom-sheet.open { transform: translateY(0); }
        .backdrop { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        body.modal-open .backdrop { opacity: 1; pointer-events: auto; }
        #readerOverlay { display: none; position: fixed; inset: 0; z-index: 200; background: #f8fafc; flex-direction: column; }
        body.dark #readerOverlay { background: #0f172a; }
        #viewer { flex: 1; width: 100%; height: 100%; overflow: hidden; }
        .reader-controls { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: #fff; z-index: 10; border-bottom: 1px solid #f1f5f9; }
        body.dark .reader-controls { background: #1e293b; border-color: #334155; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; z-index: 30; border-top: 1px solid #f1f5f9; }
        body.dark .bottom-nav { background: #1e293b; border-color: #334155; }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; padding: 12px 0; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: #4f46e5; }
        .date-input { border: none; background: transparent; color: #334155; outline: none; font-size: 14px; font-weight: 500; text-align: right; }
        body.dark .date-input { color: #f8fafc; }
    </style>
</head>
<body class="bg-[#f5f5f7] font-sans pb-32 text-slate-900 antialiased selection:bg-indigo-100">

    <div id="authScreen" class="fixed inset-0 z-[100] bg-[#f5f5f7] flex items-center justify-center p-6 overflow-y-auto">
        <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-xl border border-slate-100 my-auto">
            <div class="text-center mb-6"><span class="text-6xl mb-4 block">📚</span><h1 class="text-3xl font-black text-slate-950 tracking-tight">ЧитайКо</h1><p class="text-slate-500 mt-1">Ваша хмарна бібліотека</p></div>
            <div id="authError" class="text-center text-sm text-white bg-red-500 p-3 rounded-xl mb-4 hidden"></div>
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-indigo-500">
                <input type="password" id="authPassword" placeholder="Пароль" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-indigo-500">
                <div class="flex gap-3">
                    <button onclick="handleAuth('login', this)" class="flex-1 p-4 text-white bg-indigo-600 rounded-xl font-bold active:scale-95 transition-all">Увійти</button>
                    <button onclick="handleAuth('signup', this)" class="flex-1 p-4 bg-slate-100 rounded-xl font-bold active:scale-95 transition-all">Створити</button>
                </div>
                <button onclick="signInWithGoogle()" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-50 active:scale-95 transition-all">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Google
                </button>
            </div>
        </div>
    </div>

    <div id="appScreen" class="max-w-xl mx-auto p-4 md:p-6 pt-8 hidden">
        <header class="mb-4 flex justify-between items-start">
            <div><h1 class="text-3xl font-black text-slate-900">Бібліотека</h1><p id="userEmailDisplay" class="text-xs text-slate-400 font-medium"></p></div>
            <button onclick="openSheet('settingsSheet'); calculateStats();" class="size-10 bg-white rounded-full shadow-sm border border-slate-100 text-xl flex items-center justify-center active:scale-90 transition-all">⚙️</button>
        </header>
        
        <div id="librarySections" class="fade-in">
            <div class="flex gap-2 overflow-x-auto pb-4 scrollbar-hide" id="libraryTabs">
                <button onclick="setLibraryTab('reading')" id="tab_reading" class="px-4 py-2 rounded-full text-sm font-bold transition-all bg-indigo-600 text-white shadow-md">Читаю зараз</button>
                <button onclick="setLibraryTab('planned')" id="tab_planned" class="px-4 py-2 rounded-full text-sm font-bold transition-all bg-slate-200 text-slate-600">Хочу прочитати</button>
                <button onclick="setLibraryTab('finished')" id="tab_finished" class="px-4 py-2 rounded-full text-sm font-bold transition-all bg-slate-200 text-slate-600">Прочитано</button>
            </div>
            <div class="flex justify-end mb-4">
                <div class="bg-slate-200/60 p-1 rounded-xl flex gap-1">
                    <button onclick="setViewMode('list')" id="view_list" class="px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider bg-white shadow-sm">☰ Список</button>
                    <button onclick="setViewMode('grid')" id="view_grid" class="px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider text-slate-500">⊞ Полиці</button>
                </div>
            </div>
            <div id="myBooksContainer" class="pb-10"></div>
        </div>

        <div id="recommendationsScreen" class="hidden fade-in">
            <h2 class="text-xs font-bold uppercase text-slate-400 mb-3 ml-1 tracking-wide">Категорії</h2>
            <div class="flex gap-2 overflow-x-auto pb-4 scrollbar-hide" id="recTabs">
                <button onclick="switchRecCategory('auto', 'rec_auto')" id="rec_auto" class="px-4 py-2 rounded-full text-sm font-bold bg-indigo-600 text-white shadow-md">✨ Для вас</button>
                <button onclick="switchRecCategory('Академія магії', 'rec_magic')" id="rec_magic" class="px-4 py-2 rounded-full text-sm font-bold bg-slate-200">🔮 Академія</button>
                <button onclick="switchRecCategory('Фентезі', 'rec_fantasy')" id="rec_fantasy" class="px-4 py-2 rounded-full text-sm font-bold bg-slate-200">Фентезі</button>
                <button onclick="switchRecCategory('Детектив', 'rec_detective')" id="rec_detective" class="px-4 py-2 rounded-full text-sm font-bold bg-slate-200">Детектив</button>
                <button onclick="switchRecCategory('Фантастика', 'rec_scifi')" id="rec_scifi" class="px-4 py-2 rounded-full text-sm font-bold bg-slate-200">Фантастика</button>
            </div>
            <div id="recommendationsList" class="space-y-4 pb-12"></div>
            <div id="recLoader" class="p-8 text-center text-slate-400 hidden animate-pulse">Завантаження...</div>
        </div>
    </div>

    <div id="readerOverlay">
        <div class="reader-controls">
            <button onclick="closeReader()" class="font-bold text-red-500 bg-red-50 px-4 py-2 rounded-lg active:scale-95 transition-all">✕ Закрити</button>
            <div class="flex flex-col items-center justify-center max-w-[50%]">
                <div id="readerTitle" class="text-xs font-bold truncate text-slate-500 w-full text-center">Назва книги</div>
                <div id="readerTimer" class="text-[10px] font-mono font-bold text-slate-400 mt-0.5">00:00</div>
            </div>
            <button onclick="toggleReaderSettings()" class="font-bold text-slate-600 bg-slate-100 px-3 py-2 rounded-lg">⚙️</button>
        </div>
        <div id="viewer"></div>
        <div class="reader-controls border-t">
            <button onclick="rendition?.prev()" class="px-6 py-2 bg-slate-100 rounded-xl font-bold">←</button>
            <div id="readerProgress" class="text-[10px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 px-3 py-1.5 rounded-lg">0%</div>
            <button onclick="rendition?.next()" class="px-6 py-2 bg-indigo-600 text-white rounded-xl font-bold">→</button>
        </div>
    </div>

    <nav id="mainBottomNav" class="bottom-nav hidden fade-in">
        <div class="max-w-xl mx-auto flex items-center justify-between px-3">
            <button onclick="switchTab('library')" class="nav-item active">📚<br>Бібліотека</button>
            <button onclick="switchTab('recommendations')" class="nav-item">⭐<br>Рекомендації</button>
        </div>
    </nav>

    <button id="searchFab" onclick="openSheet('searchSheet')" class="fixed bottom-24 right-6 z-40 size-14 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-all hidden">➕</button>
    <div class="backdrop fixed inset-0 z-40 bg-black/50 backdrop-blur-sm hidden" onclick="closeAllSheets()"></div>

    <div id="searchSheet" class="bottom-sheet fixed bottom-0 left-0 right-0 z-50 bg-white h-[85vh] flex flex-col max-w-xl mx-auto shadow-2xl">
        <div class="drag-handle w-full flex justify-center py-4 cursor-grab"><div class="w-12 h-1.5 bg-slate-200 rounded-full"></div></div>
        <div class="px-6 pb-4 shrink-0">
            <h2 class="text-xl font-bold mb-4">Знайти книгу</h2>
            <div class="relative">
                <span class="absolute left-4 top-3.5 text-slate-400">🔍</span>
                <input type="text" id="searchInput" placeholder="Назва або автор (напр. Избранница грозы)..." class="w-full pl-11 pr-4 py-3.5 bg-slate-100 rounded-2xl outline-none focus:bg-white focus:ring-2 ring-indigo-500 transition-all">
            </div>
        </div>
        <div id="searchResults" class="px-3 pb-6 overflow-y-auto flex-1">
            <button onclick="openManualForm()" class="w-[calc(100%-24px)] mx-auto mb-4 p-3 text-center text-sm font-semibold text-indigo-600 bg-indigo-50 rounded-xl">✍️ Додати вручну</button>
            <div id="searchItems" class="space-y-1"></div>
        </div>
    </div>

    <div id="detailsSheet" class="bottom-sheet fixed bottom-0 left-0 right-0 z-50 bg-white max-h-[92vh] flex flex-col max-w-xl mx-auto shadow-2xl overflow-hidden">
        <div class="drag-handle w-full flex justify-center py-4"><div class="w-12 h-1.5 bg-slate-200 rounded-full"></div></div>
        <div id="detailsContent" class="flex-1 overflow-y-auto px-6 pb-6"></div>
        <div id="statusButtons" class="p-5 bg-white border-t grid grid-cols-3 gap-3 shrink-0 hidden">
            <button onclick="addBookWithStatus('planned')" class="flex flex-col items-center p-3 bg-slate-50 rounded-xl text-indigo-600"><span class="text-xl">🕒</span><span class="text-[10px] font-bold">В ПЛАНИ</span></button>
            <button onclick="addBookWithStatus('reading')" class="flex flex-col items-center p-3 bg-indigo-600 text-white rounded-xl"><span class="text-xl">📖</span><span class="text-[10px] font-bold">ЧИТАТИ</span></button>
            <button onclick="addBookWithStatus('finished')" class="flex flex-col items-center p-3 bg-emerald-50 text-emerald-700 rounded-xl"><span class="text-xl">✅</span><span class="text-[10px] font-bold">ГОТОВО</span></button>
        </div>
    </div>

    <div id="settingsSheet" class="bottom-sheet fixed bottom-0 left-0 right-0 z-50 bg-white p-6 max-w-xl mx-auto shadow-2xl">
        <h2 class="text-2xl font-bold mb-4">Налаштування</h2>
        <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4 mb-4">
            <h3 class="text-xs font-black uppercase text-indigo-400 mb-3 tracking-widest">Статистика</h3>
            <div class="flex justify-between items-center mb-2"><span class="text-sm font-bold text-slate-700">Прочитано книг:</span><span id="statBooks" class="text-lg font-black text-indigo-600">0</span></div>
            <div class="flex justify-between items-center"><span class="text-sm font-bold text-slate-700">Всього сторінок:</span><span id="statPages" class="text-lg font-black text-indigo-600">0</span></div>
        </div>
        <div class="space-y-3">
            <button onclick="toggleAppTheme()" class="w-full flex justify-between items-center p-4 bg-slate-50 rounded-2xl border font-bold text-sm">🌓 Темна тема <span>Перемкнути</span></button>
            <button onclick="exportLibrary()" class="w-full p-4 bg-emerald-50 text-emerald-600 font-bold rounded-2xl">📥 Експорт Бібліотеки (JSON)</button>
            <button onclick="logout()" class="w-full p-4 bg-red-50 text-red-600 font-bold rounded-2xl">🚪 Вийти з акаунту</button>
        </div>
    </div>

    <script>
        const PLACEHOLDER_IMG = 'https://via.placeholder.com/128x192/f1f5f9/94a3b8?text=No+Cover';
        const firebaseConfig = { apiKey: "AIzaSyAXgYW2_9ofKCvLoQFT6oMz0bCvbvldPGg", authDomain: "chitayko-pwa.firebaseapp.com", projectId: "chitayko-pwa", storageBucket: "chitayko-pwa.firebasestorage.app", messagingSenderId: "278531514478", appId: "1:278531514478:web:731dad47437f6aae2b067f" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let currentUser = null, myLibrary = [], tempSelectedBook = null, timeoutId = null;
        let currentLibraryTab = 'reading', viewMode = localStorage.getItem('viewMode') || 'list';
        let rendition = null, currentBookInstance = null, currentReaderBookId = null;
        let recCategory = 'auto', recIndex = 0, isLoadingRecs = false;
        let readingTimer = null, readingStartTime = 0, currentSessionSeconds = 0;

        // --- Auth Management ---
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                document.getElementById('searchFab').classList.remove('hidden');
                document.getElementById('mainBottomNav').classList.remove('hidden');
                document.getElementById('userEmailDisplay').innerText = user.email;
                loadLibrary();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        });

        async function handleAuth(type, btn) {
            const email = document.getElementById('authEmail').value, pass = document.getElementById('authPassword').value;
            if(email.length < 5 || pass.length < 6) return alert("Перевірте дані");
            try {
                if (type === 'login') await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch (e) { alert(e.message); }
        }
        async function signInWithGoogle() {
            const p = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(p); } catch (e) { await auth.signInWithRedirect(p); }
        }
        function logout() { auth.signOut(); location.reload(); }

        // --- Library Logic ---
        function loadLibrary() {
            db.collection('users').doc(currentUser.uid).collection('books').orderBy('dateAdded', 'desc').onSnapshot(snap => {
                myLibrary = []; snap.forEach(doc => myLibrary.push({ id: doc.id, ...doc.data() }));
                render();
            });
        }

        function calculateStats() {
            const finished = myLibrary.filter(b => b.status === 'finished');
            const totalPages = finished.reduce((sum, b) => sum + (parseInt(b.pagesTotal) || 0), 0);
            document.getElementById('statBooks').innerText = finished.length;
            document.getElementById('statPages').innerText = totalPages;
        }

        function render() {
            const container = document.getElementById('myBooksContainer');
            const filtered = myLibrary.filter(b => b.status === currentLibraryTab);
            
            document.getElementById('tab_reading').innerText = `Читаю (${myLibrary.filter(b => b.status === 'reading').length})`;
            document.getElementById('tab_planned').innerText = `Плани (${myLibrary.filter(b => b.status === 'planned').length})`;
            document.getElementById('tab_finished').innerText = `Готово (${myLibrary.filter(b => b.status === 'finished').length})`;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="mt-12 text-center text-slate-400">Тут поки порожньо</div>`;
                return;
            }

            const wrapperCls = viewMode === 'grid' ? 'grid grid-cols-3 gap-4' : 'space-y-4';
            container.innerHTML = `<div class="${wrapperCls}">${filtered.map(renderBookCard).join('')}</div>`;
        }

        function renderBookCard(book) {
            const percent = Math.round((book.pagesRead / (book.pagesTotal || 300)) * 100) || 0;
            if (viewMode === 'grid') {
                return `
                <div onclick='showBookDetails(${JSON.stringify(book).replace(/'/g, "")})' class="flex flex-col items-center animate-fade-in active:scale-95 transition-all">
                    <img src="${book.image || PLACEHOLDER_IMG}" class="aspect-[2/3] w-full object-cover rounded-xl shadow-sm border border-slate-200">
                    <h3 class="text-[10px] font-bold mt-2 truncate w-full text-center">${book.title}</h3>
                </div>`;
            }
            return `
            <div onclick='showBookDetails(${JSON.stringify(book).replace(/'/g, "")})' class="bg-white p-4 rounded-2xl shadow-sm flex gap-4 border border-slate-100 animate-fade-in active:scale-[0.98] transition-all">
                <img src="${book.image || PLACEHOLDER_IMG}" class="w-16 h-24 object-cover rounded-xl shadow-sm flex-shrink-0">
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start"><h3 class="font-bold text-slate-900 truncate">${book.title}</h3><button onclick="event.stopPropagation(); deleteBook('${book.id}')" class="text-slate-300 text-xs">✕</button></div>
                    <p class="text-xs text-slate-500 truncate mb-3">${book.author}</p>
                    <div class="bg-slate-100 h-1.5 rounded-full overflow-hidden"><div class="bg-indigo-600 h-full rounded-full transition-all" style="width: ${percent}%"></div></div>
                    <div class="flex justify-between text-[9px] font-black mt-2 text-slate-400 uppercase tracking-widest">
                        <span>⏱️ ${formatTime(book.timeSpent)}</span><span>${percent}%</span>
                    </div>
                    <div class="mt-3 flex gap-2">
                        <input type="file" id="f_${book.id}" class="hidden" accept=".epub" onchange="handleFileSelect(event, '${book.id}')">
                        <button onclick="event.stopPropagation(); document.getElementById('f_${book.id}').click()" class="flex-1 py-2 bg-slate-800 text-white text-[9px] font-black rounded-lg active:scale-95 transition-all">📁 ВІДКРИТИ</button>
                        <button onclick="promptForEpubUrl('${book.id}', event)" class="flex-1 py-2 bg-indigo-50 text-indigo-600 text-[9px] font-black rounded-lg active:scale-95 transition-all">🔗 URL</button>
                    </div>
                </div>
            </div>`;
        }

        // --- Search Management (The "Deep Search" logic) ---
        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeoutId);
            const query = e.target.value.trim();
            if (query.length < 2) return;
            searchItems.innerHTML = '<div class="p-8 text-center animate-pulse text-slate-400">Шукаю...</div>';

            timeoutId = setTimeout(async () => {
                try {
                    const urls = [
                        `https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(query)}&maxResults=40&printType=books`,
                        `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=40&printType=books`
                    ];
                    const responses = await Promise.all(urls.map(url => fetch(url).then(r => r.json())));
                    let allItems = [];
                    responses.forEach(data => { if (data.items) allItems.push(...data.items); });

                    const unique = Array.from(new Map(allItems.map(i => [i.id, i])).values());
                    searchItems.innerHTML = '';

                    unique.filter(i => isCyrillic(i.volumeInfo.title)).slice(0, 30).forEach(item => {
                        const b = item.volumeInfo;
                        const book = { 
                            googleId: item.id, 
                            title: b.title, 
                            author: b.authors?.[0] || 'Невідомий', 
                            pagesTotal: b.pageCount || 300, 
                            image: b.imageLinks?.thumbnail?.replace('http:', 'https:') || PLACEHOLDER_IMG, 
                            description: b.description || 'Опису немає.' 
                        };
                        const div = document.createElement('div');
                        div.className = "p-3 flex items-center gap-3 bg-white border border-slate-50 rounded-xl cursor-pointer active:bg-slate-50";
                        div.innerHTML = `<img src="${book.image}" class="w-10 h-14 object-cover rounded shadow-sm"><div class="min-w-0"><div class="font-bold text-sm truncate">${book.title}</div><div class="text-xs text-slate-400">${book.author}</div></div>`;
                        div.onclick = () => showBookDetails(book, true);
                        searchItems.appendChild(div);
                    });
                } catch(e) { searchItems.innerHTML = 'Помилка пошуку'; }
            }, 600);
        });

        // --- Recommendations & Infinite Scroll ---
        async function loadRecommendations() {
            if (isLoadingRecs) return;
            isLoadingRecs = true;
            document.getElementById('recLoader').classList.remove('hidden');
            let q = recCategory === 'auto' ? 'бестселер' : recCategory;
            try {
                const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&startIndex=${recIndex}&maxResults=20&printType=books`).then(r => r.json());
                if (res.items) {
                    recIndex += 20;
                    res.items.forEach(item => {
                        const b = item.volumeInfo; if (!isCyrillic(b.title)) return;
                        const bookObj = { googleId: item.id, title: b.title, author: b.authors?.[0] || 'Невідомий', pagesTotal: b.pageCount || 300, image: b.imageLinks?.thumbnail?.replace('http:', 'https:') || PLACEHOLDER_IMG, description: b.description || '' };
                        document.getElementById('recommendationsList').insertAdjacentHTML('beforeend', `
                            <div onclick='showBookDetails(${JSON.stringify(bookObj).replace(/'/g, "")}, true)' class="bg-white p-4 rounded-2xl flex gap-3 border shadow-sm active:scale-95 transition-all">
                                <img src="${bookObj.image}" class="w-16 h-24 rounded object-cover flex-shrink-0 shadow-sm">
                                <div class="min-w-0 flex-1"><div class="font-bold text-sm truncate">${bookObj.title}</div><div class="text-xs text-slate-400">${bookObj.author}</div><div class="text-[10px] text-slate-400 mt-2 line-clamp-3 leading-snug">${bookObj.description}</div></div>
                            </div>`);
                    });
                }
            } finally { isLoadingRecs = false; document.getElementById('recLoader').classList.add('hidden'); }
        }

        function switchRecCategory(cat, btnId) {
            recCategory = cat; recIndex = 0;
            document.getElementById('recommendationsList').innerHTML = '';
            document.querySelectorAll('#recTabs button').forEach(b => b.className = 'px-4 py-2 rounded-full text-sm font-bold bg-slate-200 text-slate-600');
            document.getElementById(btnId).className = 'px-4 py-2 rounded-full text-sm font-bold bg-indigo-600 text-white shadow-md';
            loadRecommendations();
        }

        // --- Timer & Reader ---
        function startTimer() {
            readingStartTime = Date.now(); currentSessionSeconds = 0;
            readingTimer = setInterval(() => {
                currentSessionSeconds = Math.floor((Date.now() - readingStartTime) / 1000);
                const m = String(Math.floor(currentSessionSeconds/60)).padStart(2, '0'), s = String(currentSessionSeconds%60).padStart(2, '0');
                document.getElementById('readerTimer').innerText = `${m}:${s}`;
            }, 1000);
        }
        function stopTimer() {
            if(readingTimer && currentReaderBookId) {
                clearInterval(readingTimer);
                const book = myLibrary.find(b => b.id === currentReaderBookId);
                if(book) {
                    const newTotal = (book.timeSpent || 0) + currentSessionSeconds;
                    db.collection('users').doc(currentUser.uid).collection('books').doc(currentReaderBookId).update({ timeSpent: newTotal });
                }
            }
        }

        function startReaderUI(book) {
            currentReaderBookId = book.id;
            document.getElementById('readerOverlay').style.display = 'flex';
            document.getElementById('readerTitle').innerText = book.title;
            document.getElementById('appScreen').classList.add('hidden');
            startTimer();
        }

        function loadEpub(source, book) {
            document.getElementById('viewer').innerHTML = '';
            currentBookInstance = ePub(source);
            rendition = currentBookInstance.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated", manager: "continuous" });
            rendition.display(book.lastCfi || undefined);
            rendition.on("relocated", loc => {
                if(loc.start) {
                    const pct = Math.round(loc.start.percentage * 100);
                    document.getElementById('readerProgress').innerText = pct + "%";
                    db.collection('users').doc(currentUser.uid).collection('books').doc(book.id).update({ lastCfi: loc.start.cfi, pagesRead: Math.round((pct/100) * (book.pagesTotal || 300)) });
                }
            });
        }

        function handleFileSelect(e, id) {
            const file = e.target.files[0]; if(!file) return;
            const book = myLibrary.find(b => b.id === id);
            startReaderUI(book);
            const r = new FileReader(); r.onload = (ev) => loadEpub(ev.target.result, book);
            r.readAsArrayBuffer(file);
        }

        // --- UI Helpers ---
        function switchTab(t) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (t === 'library') {
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                document.getElementById('librarySections').classList.remove('hidden');
                document.getElementById('recommendationsScreen').classList.add('hidden');
                document.getElementById('searchFab').classList.remove('hidden');
            } else {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                document.getElementById('librarySections').classList.add('hidden');
                document.getElementById('recommendationsScreen').classList.remove('hidden');
                document.getElementById('searchFab').classList.add('hidden');
                if (recIndex === 0) loadRecommendations();
            }
        }
        function openSheet(id) { document.body.classList.add('modal-open'); document.getElementById(id).classList.add('open'); document.querySelector('.backdrop').classList.remove('hidden'); }
        function closeAllSheets() { document.body.classList.remove('modal-open'); document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('open')); document.querySelector('.backdrop').classList.add('hidden'); }
        function closeReader() { stopTimer(); document.getElementById('readerOverlay').style.display='none'; document.getElementById('appScreen').classList.remove('hidden'); if(currentBookInstance) currentBookInstance.destroy(); }
        function isCyrillic(t) { return /[а-яА-ЯіІїЇєЄґҐ]/.test(t); }
        function formatTime(s) { if(!s) return "0хв"; return Math.floor(s/60) + " хв"; }
        function setLibraryTab(t) { currentLibraryTab = t; render(); }
        function setViewMode(m) { viewMode = m; localStorage.setItem('viewMode', m); render(); }
        
        async function addBookWithStatus(s) {
            const d = { ...tempSelectedBook, status: s, dateAdded: Date.now(), pagesRead: s==='finished' ? tempSelectedBook.pagesTotal : 0, timeSpent: 0 };
            await db.collection('users').doc(currentUser.uid).collection('books').add(d);
            closeAllSheets();
        }
        function deleteBook(id) { if(confirm("Видалити?")) db.collection('users').doc(currentUser.uid).collection('books').doc(id).delete(); }
        function promptForEpubUrl(id, e) { e.stopPropagation(); const url = prompt("URL книги (.epub):"); if(url) db.collection('users').doc(currentUser.uid).collection('books').doc(id).update({ epubUrl: url }); }

        function showBookDetails(b, isSearch = false) {
            tempSelectedBook = isSearch ? b : null;
            document.getElementById('detailsContent').innerHTML = `
                <div class="flex gap-5 mb-6 pt-2"><img src="${b.image}" class="w-28 h-40 rounded-2xl object-cover shadow-lg border">
                <div class="flex-1 py-1"><h3 class="text-xl font-bold leading-tight">${b.title}</h3><p class="text-indigo-600 font-bold mt-1">${b.author}</p><p class="text-xs text-slate-400 mt-4">${b.pagesTotal} сторінок</p></div></div>
                <div class="mb-4"><h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Анотація</h4><p class="text-sm text-slate-700 leading-relaxed">${b.description || 'Немає опису'}</p></div>`;
            if(isSearch) document.getElementById('statusButtons').classList.remove('hidden');
            else document.getElementById('statusButtons').classList.add('hidden');
            openSheet('detailsSheet');
        }

        window.onscroll = () => {
            if (document.getElementById('recommendationsScreen').classList.contains('hidden')) return;
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) { if (!isLoadingRecs) loadRecommendations(); }
        };
    </script>
</body>
</html>
