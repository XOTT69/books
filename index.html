<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧитайКо — Хмарний Трекер</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1e293b;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #4f46e5;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
        }
        .auth-section {
            background: #f8fafc;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #4f46e5;
            color: white;
        }
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }
        .btn-secondary:hover {
            background: #d1d5db;
        }
        .google-btn {
            width: 100%;
            background: white;
            border: 2px solid #e5e7eb;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
        }
        .google-btn:hover {
            background: #f9fafb;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .success {
            background: #dcfce7;
            color: #166534;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
        .hidden {
            display: none;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 class="title">📚 ЧитайКо</h1>
            <p class="subtitle">Ваша хмарна бібліотека</p>
        </div>

        <div id="error-message" class="error"></div>
        <div id="success-message" class="success"></div>

        <div id="auth-section" class="auth-section">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Мінімум 6 символів" autocomplete="current-password">
            </div>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="signIn()">Увійти</button>
                <button class="btn btn-secondary" onclick="signUp()">Створити</button>
            </div>
            
            <button class="google-btn" onclick="signInWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Увійти через Google
            </button>
        </div>

        <div id="app-section" class="hidden">
            <div class="loading">
                <p>Завантаження бібліотеки...</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase конфігурація
        const firebaseConfig = {
            apiKey: "AIzaSyAXgYW2_9ofKCvLoQFT6oMz0bCvbvldPGg",
            authDomain: "chitayko-pwa.firebaseapp.com",
            projectId: "chitayko-pwa",
            storageBucket: "chitayko-pwa.firebasestorage.app",
            messagingSenderId: "278531514478",
            appId: "1:278531514478:web:731dad47437f6aae2b067f"
        };

        // Ініціалізація Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Показати помилку
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Показати успіх
        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        // Вхід
        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Введіть email та пароль');
                return;
            }

            try {
                await auth.signInWithEmailAndPassword(email, password);
                showSuccess('Вхід успішний!');
            } catch (error) {
                showError('Помилка входу: ' + error.message);
            }
        }

        // Реєстрація
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Введіть email та пароль');
                return;
            }

            if (password.length < 6) {
                showError('Пароль має містити мінімум 6 символів');
                return;
            }

            try {
                await auth.createUserWithEmailAndPassword(email, password);
                showSuccess('Акаунт створено успішно!');
            } catch (error) {
                showError('Помилка реєстрації: ' + error.message);
            }
        }

        // Вхід через Google
        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                showSuccess('Вхід через Google успішний!');
            } catch (error) {
                showError('Помилка входу через Google: ' + error.message);
            }
        }

        // Слідкування за станом автентифікації
        auth.onAuthStateChanged(user => {
            const authSection = document.getElementById('auth-section');
            const appSection = document.getElementById('app-section');

            if (user) {
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                appSection.innerHTML = `
                    <div class="fade-in">
                        <h2>🎉 Вітаємо, ${user.email}!</h2>
                        <p>Ваша бібліотека готова до використання.</p>
                        <div style="margin-top: 30px;">
                            <button class="btn btn-primary" onclick="signOut()">Вийти</button>
                        </div>
                    </div>
                `;
            } else {
                authSection.classList.remove('hidden');
                appSection.classList.add('hidden');
            }
        });

        // Вихід
        function signOut() {
            auth.signOut();
        }

        // Service Worker для PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw-simple.js').then(registration => {
                console.log('Service Worker зареєстровано:', registration);
            }).catch(error => {
                console.log('Помилка реєстрації Service Worker:', error);
            });
        }

        console.log('🚀 ЧитайКо завантажено успішно!');
    </script>
</body>
</html>
