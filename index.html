        .nav-item { flex: 1; text-align: center; color: #94a3b8; font-weight: bold; padding: 12px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.2s; cursor: pointer; background: transparent; border: none; }

    <script>
        const PLACEHOLDER_IMG = 'https://via.placeholder.com/128x192/f1f5f9/94a3b8?text=No+Cover';
        const firebaseConfig = { apiKey: "AIzaSyAXgYW2_9ofKCvLoQFT6oMz0bCvbvldPGg", authDomain: "chitayko-pwa.firebaseapp.com", projectId: "chitayko-pwa", storageBucket: "chitayko-pwa.firebasestorage.app", messagingSenderId: "278531514478", appId: "1:278531514478:web:731dad47437f6aae2b067f", measurementId: "G-1JN4FBQ13K" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        
        let currentUser = null, myLibrary = [], tempSelectedBook = null, timeoutId = null;
        let currentLibraryTab = 'reading', viewMode = localStorage.getItem('viewMode') || 'list'; 
        let rendition = null, currentReaderBookId = null, currentBookInstance = null;
        let readerTheme = localStorage.getItem('readerTheme') || 'light', readerFontSize = parseInt(localStorage.getItem('readerFontSize')) || 100;
        let readingTimer = null, readingStartTime = 0, currentSessionSeconds = 0;

        // Глобальні змінні для нескінченного скролу рекомендацій
        let recStartIndex = 0;
        let currentRecQueries = [];
        let isFetchingRecs = false;
        let currentRecCategory = null;

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.bottom-sheet').forEach(sheet => {
                let startY = 0, currentY = 0, isDragging = false;
                sheet.addEventListener('touchstart', e => { 
                    const scrollable = sheet.querySelector('.overflow-y-auto');
                    if (!scrollable || scrollable.scrollTop <= 0 || e.target.closest('.drag-handle')) {
                        startY = e.touches[0].clientY; isDragging = true; sheet.style.transition = 'none'; 
                    }
                }, {passive: true});
                sheet.addEventListener('touchmove', e => { 
                    if (!isDragging) return; currentY = e.touches[0].clientY; const deltaY = currentY - startY; 
                    if (deltaY > 0) sheet.style.transform = `translateY(${deltaY}px)`; 
                }, {passive: true});

        function isEnglishTitle(title) {
            if (!title) return true;
            const letters = title.match(/[a-zA-Zа-яА-ЯіІїЇєЄґҐ]/g);
            if (!letters) return false;
            const engLetters = title.match(/[a-zA-Z]/g);
            return (engLetters && engLetters.length > (letters.length * 0.4));
        }

        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeoutId); const query = e.target.value.trim();
            if (query.length < 2) { searchItems.innerHTML = ''; return; }
            searchItems.innerHTML = '<div class="p-8 text-slate-400 text-sm text-center animate-pulse">Шукаю...</div>';

            timeoutId = setTimeout(async () => {
                try {
                    // КЛЮЧОВА ЗМІНА: Ширший пошук, сортування за релевантністю
                    const searchQuery = encodeURIComponent(query);
                    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${searchQuery}&maxResults=40&orderBy=relevance`);
                    const data = await res.json(); searchItems.innerHTML = '';
                    
                    if (!data.items) return searchItems.innerHTML = '<div class="p-8 text-slate-400 text-sm text-center">Нічого не знайдено</div>';

                    // Відсіюємо англійські книги та явне сміття
                    const allowedLangs = ['uk', 'ru', 'bg']; 
                    const filteredItems = data.items.filter(item => {
                        const b = item.volumeInfo;
                        if (!b || !b.title) return false;
                        
                        // Фільтр мови від Google
                        if (b.language && !allowedLangs.includes(b.language) && b.language !== 'un') return false;
                        
                        // Ручний фільтр на англійські літери в назві
                        if (isEnglishTitle(b.title)) return false;
                        
                        // Відкидаємо явні брошури, але пропускаємо книги, де сторінки просто не вказані (як буває з електронними)
                        if (b.pageCount !== undefined && b.pageCount > 0 && b.pageCount < 50) return false;

                        return true;
                    }).slice(0, 30);

                    if (filteredItems.length === 0) return searchItems.innerHTML = '<div class="p-8 text-slate-400 text-sm text-center">Не знайдено художніх книг за цим запитом.</div>';

                        const book = { 
                            googleId: item.id || Math.random().toString(),

                            pagesTotal: b.pageCount || 300, 
                            image: safeImage, 
                            description: b.description || 'Анотація відсутня.', 
                            genre: genre 
                        };
                        
                        div.className = "p-3 mx-2 my-1 hover:bg-slate-100 rounded-2xl cursor-pointer flex items-center gap-4 active:bg-slate-200 fade-in";
                        div.innerHTML = `<img src="${book.image}" class="w-12 h-16 object-cover rounded-lg shadow-sm"><div class="flex-1 min-w-0 pr-2"><div class="font-bold text-slate-900 truncate">${book.title}</div><div class="text-xs text-slate-500 mt-0.5 truncate">${book.author}</div></div>`;
                        div.onclick = () => showBookDetails(book, true); searchItems.appendChild(div);
                    });
                } catch (e) { searchItems.innerHTML = `<div class="p-8 text-red-500 text-sm text-center">Перевірте підключення</div>`; }
            }, 600);
        });

        function startTimer() { readingStartTime = Date.now(); currentSessionSeconds = 0; document.getElementById('readerTimer').innerText = "00:00"; readingTimer = setInterval(() => { currentSessionSeconds = Math.floor((Date.now() - readingStartTime) / 1000); const m = String(Math.floor(currentSessionSeconds / 60)).padStart(2, '0'), s = String(currentSessionSeconds % 60).padStart(2, '0'), h = Math.floor(currentSessionSeconds / 3600); document.getElementById('readerTimer').innerText = h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`; }, 1000); }
        function stopTimer() { if (readingTimer && currentReaderBookId) { clearInterval(readingTimer); readingTimer = null; const book = myLibrary.find(b => b.id === currentReaderBookId); if (book && currentSessionSeconds > 5) { const totalTime = (book.timeSpent || 0) + currentSessionSeconds; db.collection('users').doc(currentUser.uid).collection('books').doc(currentReaderBookId).update({ timeSpent: totalTime }); } } }

        function handleFileSelect(event, bookId) {
            const file = event.target.files[0]; if (!file) return; if (!file.name.toLowerCase().endsWith('.epub')) { alert("Будь ласка, виберіть файл у форматі .epub"); event.target.value = ''; return; }
            const bookData = myLibrary.find(b => b.id === bookId);

            if (bookData.lastFileName !== file.name) updateBookInFirestore(bookId, { lastFileName: file.name });
            startReaderUI(bookData); const reader = new FileReader(); reader.onload = function(e) { loadEpubData(e.target.result, bookData); }; reader.onerror = function() { alert("Помилка."); closeReader(); }; reader.readAsArrayBuffer(file); event.target.value = '';

        function loadEpubData(source, bookData) {
            document.getElementById('viewer').innerHTML = ''; 
            try {
                currentBookInstance = ePub(source); rendition = currentBookInstance.renderTo("viewer", { width: "100%", height: "100%", spread: "none", manager: "continuous", flow: "paginated" });
                rendition.themes.register("light", { "body": { "background": "#f8fafc", "color": "#0f172a" }}); rendition.themes.register("sepia", { "body": { "background": "#f4ecd8", "color": "#5b4636" }}); rendition.themes.register("dark", { "body": { "background": "#0f172a", "color": "#cbd5e1" }});
                applyReaderSettings();
                const safeCfi = (bookData.lastCfi && typeof bookData.lastCfi === 'string' && bookData.lastCfi.startsWith('epubcfi')) ? bookData.lastCfi : undefined;
                rendition.display(safeCfi).catch(() => rendition.display());
                currentBookInstance.ready.then(() => currentBookInstance.locations.generate(1600)).then(() => { const loc = rendition.currentLocation(); if(loc && loc.start) document.getElementById('readerProgress').innerText = Math.round(loc.start.percentage * 100) + "%"; else document.getElementById('readerProgress').innerText = "Відкрито"; }).catch(err => console.log(err));
                rendition.on("relocated", (location) => {
                    if (location && location.start) {
                        let percent = 0; if (location.start.percentage) percent = Math.round(location.start.percentage * 100); document.getElementById('readerProgress').innerText = percent > 0 ? percent + "%" : "Рахуємо...";
                        if (percent > 0) db.collection('users').doc(currentUser.uid).collection('books').doc(currentReaderBookId).update({ lastCfi: location.start.cfi, pagesRead: Math.round((percent / 100) * (bookData.pagesTotal || 300)) }); else db.collection('users').doc(currentUser.uid).collection('books').doc(currentReaderBookId).update({ lastCfi: location.start.cfi });
                    }
                });
            } catch (err) { console.error(err); document.getElementById('readerProgress').innerText = "Помилка"; stopTimer(); }
        }

        function closeReader() { stopTimer(); document.getElementById('readerOverlay').style.display = 'none'; document.getElementById('readerSettingsMenu').classList.add('hidden'); if(currentBookInstance) { currentBookInstance.destroy(); currentBookInstance = null; rendition = null; } document.getElementById('viewer').innerHTML = ''; document.getElementById('librarySections').classList.remove('hidden'); }
        function deleteBook(id, event) { event.stopPropagation(); if(confirm("Видалити книгу?")) db.collection('users').doc(currentUser.uid).collection('books').doc(id).delete(); }
        function formatTime(secs) { if (!secs) return "0 хв"; const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60); return h > 0 ? `${h} год ${m} хв` : `${m} хв`; }

        function setLibraryTab(tab) { currentLibraryTab = tab; document.querySelectorAll('#libraryTabs button').forEach(btn => { btn.className = 'px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-200 bg-slate-200 text-slate-600 dark-inactive-tab active:scale-95'; }); document.getElementById('tab_' + tab).className = 'px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-200 bg-indigo-600 text-white shadow-md active:scale-95'; render(); }

        function renderBookCard(book) {
            const percent = Math.round((book.pagesRead / book.pagesTotal) * 100) || 0;
            const isFinished = book.status === 'finished'; const isPlanned = book.status === 'planned'; const isReading = book.status === 'reading';

            if (viewMode === 'grid') {
                return `<div data-id="${book.id}" onclick="showBookDetails(${JSON.stringify(book).replace(/"/g, '&quot;')})" class="flex flex-col items-center cursor-pointer fade-in active:scale-[0.98] transition-transform ${isFinished ? 'opacity-80' : ''}"><div class="relative w-full aspect-[2/3]"><img src="${book.image || PLACEHOLDER_IMG}" onerror="this.src='${PLACEHOLDER_IMG}'" class="w-full h-full rounded-xl shadow-md object-cover border border-slate-200">${isFinished && book.rating ? `<div class="absolute -bottom-2 -right-2 bg-white text-amber-400 text-[10px] font-black px-1.5 py-0.5 rounded-md shadow-sm border border-slate-100">★${book.rating}</div>` : ''}</div><h3 class="font-bold text-slate-900 text-[11px] leading-tight mt-2 w-full text-center truncate px-1">${book.title}</h3></div>`;
            }

            return `
            <div data-id="${book.id}" onclick="showBookDetails(${JSON.stringify(book).replace(/"/g, '&quot;')})" class="bg-white p-4 rounded-[1.25rem] shadow-sm flex gap-4 items-start cursor-pointer border border-slate-100 fade-in active:scale-[0.98] transition-transform ${isFinished ? 'opacity-80' : ''}">
                <img src="${book.image || PLACEHOLDER_IMG}" onerror="this.src='${PLACEHOLDER_IMG}'" class="w-16 h-24 rounded-xl shadow-sm object-cover flex-shrink-0 border border-slate-100">
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start gap-2"><div class="min-w-0"><h3 class="font-bold text-slate-900 text-[15px] leading-snug truncate">${book.title}</h3><p class="text-[13px] text-slate-500 mt-0.5 truncate">${book.author}</p></div><button onclick="deleteBook('${book.id}', event)" class="text-slate-300 hover:text-red-500 flex-shrink-0 transition-colors p-1">✕</button></div>
                    ${isPlanned ? `<button onclick="changeStatus('${book.id}', 'reading', event)" class="w-full mt-4 py-2 bg-indigo-50 text-indigo-700 font-bold text-xs rounded-lg active:scale-95 transition-transform">🚀 Почати читати</button>` : `
                        <div class="mt-3 mb-1.5 flex items-center gap-2"><div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden border border-slate-200"><div class="progress-bar bg-indigo-600 h-full rounded-full" style="width: ${percent}%"></div></div>${isReading ? `<button onclick="changeStatus('${book.id}', 'finished', event)" class="shrink-0 bg-emerald-50 text-emerald-600 border border-emerald-100 px-2 py-0.5 rounded text-[10px] font-bold active:scale-95 transition-transform" title="Завершити">✅ Завершити</button>` : ''}</div>
                        <div class="flex items-center justify-between text-[11px] font-bold mt-1 mb-2"><span class="text-slate-400 uppercase tracking-wider">⏱️ ${formatTime(book.timeSpent)}</span><span class="text-indigo-600">${percent}%</span></div>
                        <div class="space-y-1.5 border-t border-slate-50 pt-2.5 text-[10px] text-slate-500">
                            ${book.dateStarted ? `<div class="flex items-center justify-between"><span>Почато:</span><input type="date" value="${book.dateStarted}" class="date-input" onchange="saveManualDate('${book.id}', 'dateStarted', this)" onclick="event.stopPropagation()"></div>` : ''}
                            ${book.dateFinished ? `<div class="flex items-center justify-between"><span>Закінчено:</span><input type="date" value="${book.dateFinished}" class="date-input" onchange="saveManualDate('${book.id}', 'dateFinished', this)" onclick="event.stopPropagation()"></div>` : ''}
                        </div>
                        <div class="mt-3 flex flex-col gap-1.5 border-t border-slate-50 pt-3">
                            ${book.epubUrl ? `<button onclick="openReaderFromUrl('${book.id}', '${book.epubUrl}', event)" class="w-full py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold active:scale-95 transition-transform shadow-sm">☁️ Читати онлайн</button><button onclick="promptForEpubUrl('${book.id}', event)" class="w-full text-[10px] text-slate-400">Змінити посилання</button>` : `<button onclick="promptForEpubUrl('${book.id}', event)" class="w-full py-2 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold active:scale-95 transition-transform">🔗 Додати URL (.epub)</button>`}
                            <div class="relative w-full"><input type="file" id="epubFile_${book.id}" accept=".epub" class="hidden" onchange="handleFileSelect(event, '${book.id}')"><button onclick="event.stopPropagation(); document.getElementById('epubFile_${book.id}').click();" class="w-full py-2 bg-slate-800 text-white rounded-lg text-xs font-bold active:scale-95 transition-transform shadow-sm">📁 Файл з пристрою</button></div>
                        </div>
                    `}
                </div>
            </div>`;
        }

        function render() {
            const reading = myLibrary.filter(b => b.status === 'reading'); const planned = myLibrary.filter(b => b.status === 'planned'); const finished = myLibrary.filter(b => b.status === 'finished');
            document.getElementById('tab_reading').innerText = `Читаю зараз (${reading.length})`; document.getElementById('tab_planned').innerText = `Хочу прочитати (${planned.length})`; document.getElementById('tab_finished').innerText = `Прочитано (${finished.length})`;
            const container = document.getElementById('myBooksContainer');
            
            if ((currentLibraryTab === 'reading' && reading.length === 0) || (currentLibraryTab === 'planned' && planned.length === 0) || (currentLibraryTab === 'finished' && finished.length === 0)) { container.innerHTML = `<div class="mt-10 text-center px-6"><span class="text-4xl block mb-4">📚</span><h3 class="text-xl font-bold text-slate-900 mb-2">Тут поки порожньо</h3><p class="text-slate-500 text-sm">Додайте сюди книги!</p></div>`; return; }
            
            container.classList.remove('fade-in'); void container.offsetWidth; container.classList.add('fade-in');
            const wrapperClass = viewMode === 'grid' ? 'grid grid-cols-3 gap-4 sortable-list' : 'space-y-3 sortable-list';
            
            if (currentLibraryTab === 'reading') { container.innerHTML = `<div class="${wrapperClass}">${reading.map(renderBookCard).join('')}</div>`; }
            else if (currentLibraryTab === 'planned') { container.innerHTML = `<div class="${wrapperClass}">${planned.map(renderBookCard).join('')}</div>`; }
            else if (currentLibraryTab === 'finished') {
                finished.sort((a, b) => { const dateA = a.dateFinished || '1970-01-01'; const dateB = b.dateFinished || '1970-01-01'; return dateB.localeCompare(dateA); });
                const grouped = {}; finished.forEach(b => { let year = 'Без дати'; try { if (b.dateFinished && typeof b.dateFinished === 'string') year = b.dateFinished.substring(0, 4); else if (b.dateFinished && typeof b.dateFinished === 'number') year = new Date(b.dateFinished).getFullYear().toString(); else if (b.dateAdded) year = new Date(b.dateAdded).getFullYear().toString(); } catch(e) {} if(!grouped[year]) grouped[year] = []; grouped[year].push(b); });
                let html = ''; Object.keys(grouped).sort((a, b) => { if (a === 'Без дати') return 1; if (b === 'Без дати') return -1; return b - a; }).forEach(year => { html += `<h2 class="font-black text-slate-300 text-lg mt-6 mb-3 tracking-widest">${year}</h2><div class="${wrapperClass}">${grouped[year].map(renderBookCard).join('')}</div>`; });
                container.innerHTML = html;
            }

            if (viewMode === 'grid') {
                document.querySelectorAll('.sortable-list').forEach(list => {
                    new Sortable(list, { delay: 300, delayOnTouchOnly: true, animation: 150, ghostClass: 'sortable-ghost' });
                });
            }
        }

        function switchTab(tab) {
            document.getElementById('appScreen').classList.remove('hidden'); document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const navItems = document.querySelectorAll('.nav-item');
            if (tab === 'library') { 
                navItems[0].classList.add('active'); 
                const lib = document.getElementById('librarySections'); lib.classList.remove('hidden', 'fade-in'); void lib.offsetWidth; lib.classList.add('fade-in'); 
                document.getElementById('recommendationsScreen').classList.add('hidden'); 
            } 
            else if (tab === 'recommendations') { 
                navItems[1].classList.add('active'); 
                const rec = document.getElementById('recommendationsScreen'); rec.classList.remove('hidden', 'fade-in'); void rec.offsetWidth; rec.classList.add('fade-in'); 
                document.getElementById('librarySections').classList.add('hidden'); 
                if(!currentRecCategory) loadRealRecommendations('auto', 'rec_auto'); 
            }
        }

        const curatedCategories = {
            'Академія магії': ['"академия магии" фэнтези', '"магическая академия"', 'ромфант академия'],
            'Фентезі': ['"фентезі" бестселер', '"фэнтези" бестселлер', 'Джон Толкин', 'Джордж Мартин', 'Анджей Сапковский', 'Терри Пратчетт', 'Робин Хобб'],
            'Детектив': ['"детектив" бестселер', '"детектив" бестселлер', 'Агата Кристи', 'Артур Конан Дойл', 'Ю Несбё', 'Жан-Кристоф Гранже', 'Стиг Ларссон'],
            'Трилер': ['"трилер" бестселер', '"триллер" бестселлер', 'Стивен Кинг', 'Джиллиан Флинн', 'Томас Харрис', 'Дэн Браун', 'Джон Маррс'],
            'Романтика': ['"любовний роман" бестселер', '"любовный роман" бестселлер', 'Николас Спаркс', 'Джоджо Мойес', 'Колин Гувер', 'Джейн Остин', 'Эмили Бронте'],
            'Саморозвиток': ['"саморозвиток" бестселер', '"саморазвитие" бестселлер', 'Роберт Кийосаки', 'Марк Мэнсон', 'Джо Диспенза', 'Джеймс Клир'],
            'Фантастика': ['"наукова фантастика" бестселер', '"научная фантастика" бестселлер', 'Фрэнк Герберт Дюна', 'Айзек Азимов', 'Рэй Брэдбери', 'Джордж Оруэлл', 'Энди Вейер']
        };

        // НОВИЙ МЕХАНІЗМ РЕКОМЕНДАЦІЙ З INFINITE SCROLL
        async function loadRealRecommendations(category = 'auto', btnId = 'rec_auto') {
            if (currentRecCategory === category) return;
            currentRecCategory = category;
            recStartIndex = 0;
            currentRecQueries = [];

            const list = document.getElementById('recommendationsList');
            list.innerHTML = `<div class="p-8 flex flex-col items-center justify-center text-slate-400 text-sm fade-in animate-pulse w-full"><span class="text-3xl mb-3">🔍</span>Шукаємо круті книги...</div>`;

            document.querySelectorAll('#recTabs button').forEach(btn => { btn.className = 'px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-slate-200 text-slate-600 dark-inactive-tab transition-all active:scale-95'; });
            if (btnId) document.getElementById(btnId).className = 'px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-indigo-600 text-white shadow-md transition-all active:scale-95';

            let queries = [];
            if (category === 'auto') {
                let authors = myLibrary.map(b => b.author).filter(a => a && a.length > 2 && !a.toLowerCase().includes('невідомий') && !a.toLowerCase().includes('автор'));
                if (authors.length > 0) {
                    let counts = {}; authors.forEach(a => counts[a] = (counts[a] || 0) + 1);
                    let topAuthors = Object.keys(counts).sort((a,b) => counts[b] - counts[a]).slice(0, 3);
                    queries = topAuthors.map(a => `inauthor:"${a}"`);
                } else { queries = ['Стивен Кинг', 'Агата Кристи', '"бестселер"']; }
                const allCurated = Object.values(curatedCategories).flat();
                queries.push(allCurated[Math.floor(Math.random() * allCurated.length)]);
            } else {
                const listData = curatedCategories[category];
                queries = listData.sort(() => 0.5 - Math.random()).slice(0, 3);
            }
            
            currentRecQueries = queries;
            await fetchMoreRecommendations(true);
        }

        async function fetchMoreRecommendations(isFirstLoad = false) {
            if (isFetchingRecs || currentRecQueries.length === 0) return;
            isFetchingRecs = true;

            const list = document.getElementById('recommendationsList');

            if (!isFirstLoad) {
                const loadingDiv = document.createElement('div');
                loadingDiv.id = 'recLoadingMore';
                loadingDiv.className = 'py-6 flex justify-center text-slate-400 text-sm animate-pulse w-full';
                loadingDiv.innerHTML = 'Завантажуємо ще...';
                list.appendChild(loadingDiv);
            }

            try {
                let fetchPromises = [];
                currentRecQueries.forEach(q => {
                    const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=40&startIndex=${recStartIndex}`;
                    fetchPromises.push(fetch(url).then(r => r.ok ? r.json() : {items: []}));
                });

                const results = await Promise.all(fetchPromises);
                let allItems = [];
                results.forEach(res => { if (res.items) allItems.push(...res.items); });

                if (isFirstLoad) list.innerHTML = '';
                else if (document.getElementById('recLoadingMore')) document.getElementById('recLoadingMore').remove();

                if (allItems.length === 0 && isFirstLoad) {
                    list.innerHTML = `<div class="p-8 text-center text-slate-400 text-sm w-full">Не знайшли нових книг 😔 Спробуйте іншу категорію.</div>`;
                    isFetchingRecs = false;
                    return;
                } else if (allItems.length === 0) {
                    isFetchingRecs = false;
                    return; 
                }

                const banWords = ['учебник', 'словарь', 'журнал', 'комикс', 'манга', 'підручник', 'словник', 'вісник', 'сборник', 'збірник', 'посібник', 'пособие', 'том ', 'випуск', 'выпуск', 'зошит', 'тетрадь', 'хрестоматия', 'дневник'];
                const existingTitles = new Set(myLibrary.map(b => b.title.trim().toLowerCase()));

                const filtered = allItems.filter(item => {
                    const b = item.volumeInfo;
                    if (!b.title || !b.description || b.description.length < 20) return false;
                    
                    // Відсіюємо брошури, але пропускаємо книги без вказаної кількості сторінок
                    if (b.pageCount !== undefined && b.pageCount > 0 && b.pageCount < 50) return false;
                    if (!isCyrillic(b.title)) return false;
                    if (isEnglishTitle(b.title)) return false;

                    const tLower = b.title.toLowerCase();
                    if (banWords.some(bw => tLower.includes(bw))) return false;
                    if (existingTitles.has(tLower)) return false;
                    return true;
                });

                const uniqueMap = new Map();
                filtered.forEach(item => uniqueMap.set(item.volumeInfo.title.toLowerCase().split(' ')[0], item));
                let finalBooks = Array.from(uniqueMap.values());
                finalBooks.sort(() => 0.5 - Math.random());

                let html = '';
                finalBooks.forEach(item => {
                    const b = item.volumeInfo; const safeImg = (b.imageLinks?.thumbnail || PLACEHOLDER_IMG).replace(/^http:\/\//i, 'https://');
                    const bookObj = { googleId: item.id || Math.random().toString(), title: b.title, author: b.authors ? b.authors[0] : 'Невідомий', pagesTotal: b.pageCount || 300, image: safeImg, description: b.description || 'Опис відсутній.', genre: b.categories ? b.categories[0] : '' };
                    html += `
                    <div onclick="showBookDetails(${JSON.stringify(bookObj).replace(/"/g, '&quot;')}, true)" class="bg-white p-4 rounded-xl flex gap-3 items-start border border-slate-100 cursor-pointer shadow-sm mb-3 fade-in active:scale-[0.98] transition-transform">
                        <img src="${bookObj.image}" class="w-16 h-24 rounded shadow-sm object-cover flex-shrink-0">
                        <div class="flex-1 min-w-0"><div class="font-bold text-sm text-slate-900 leading-tight">${bookObj.title}</div><div class="text-xs text-slate-500 mt-0.5">${bookObj.author}</div><div class="text-[10px] text-slate-400 mt-1.5 line-clamp-2 leading-snug">${bookObj.description}</div></div>
                        <button class="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg text-xs font-bold shrink-0 mt-2 pointer-events-none">➕</button>
                    </div>`;
                });

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                while(tempDiv.firstChild) {
                    list.appendChild(tempDiv.firstChild);
                }

                recStartIndex += 40; 

            } catch(e) {
                console.error(e);
                if (isFirstLoad) list.innerHTML = `<div class="p-8 text-center text-slate-400 text-sm w-full">Помилка пошуку. Перевірте інтернет або спробуйте пізніше.</div>`;
                else if (document.getElementById('recLoadingMore')) document.getElementById('recLoadingMore').remove();
            }

            isFetchingRecs = false;
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Помилка:', err)); }); }
    </script>
</body>
</html>
