<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЧитайКо — Хмарний Трекер</title>

    <meta name="description" content="Особиста хмарна бібліотека, трекер читання та EPUB-читалка">
    <meta name="theme-color" content="#4f46e5">
    <meta name="color-scheme" content="light dark">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ЧитайКо">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="application-name" content="ЧитайКо">
    <meta name="format-detection" content="telephone=no">

    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-[#f5f5f7] font-sans pb-32 text-slate-900 antialiased selection:bg-indigo-100">

    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-[300] px-4 py-3 rounded-2xl bg-slate-900 text-white text-sm font-semibold shadow-2xl hidden"></div>

    <div id="authScreen" class="fixed inset-0 z-[100] bg-[#f5f5f7] flex items-center justify-center p-6 overflow-y-auto fade-in">
        <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-xl border border-slate-100 my-auto">
            <div class="text-center mb-6">
                <span class="text-6xl mb-4 block">📚</span>
                <h1 class="text-3xl font-black tracking-tight text-slate-950">ЧитайКо</h1>
                <p class="text-slate-500 mt-1 font-medium">Ваша хмарна бібліотека</p>
            </div>

            <div id="authError" class="text-center text-sm text-white bg-red-500 font-medium p-3 rounded-xl mb-4 hidden shadow-sm fade-in"></div>

            <div id="emailAuthBlock" class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-indigo-500 font-medium transition-shadow">
                <input type="password" id="authPassword" placeholder="Пароль (мін. 6 символів)" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-indigo-500 font-medium transition-shadow">
                <div class="flex gap-3 pt-2">
                    <button id="loginBtn" class="flex-1 p-4 text-white bg-indigo-600 rounded-xl font-bold active:scale-95 transition-all">Увійти</button>
                    <button id="signupBtn" class="flex-1 p-4 text-slate-700 bg-slate-100 rounded-xl font-bold active:scale-95 transition-all">Створити</button>
                </div>
            </div>

            <div class="relative flex py-6 items-center">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink-0 mx-4 text-slate-400 text-xs font-bold uppercase">Або</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <div class="space-y-3">
                <button id="googleBtn" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl font-bold text-slate-700 flex items-center justify-center gap-3 hover:bg-slate-50 active:scale-95 transition-all shadow-sm">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5">
                    Увійти через Google
                </button>
            </div>
        </div>
    </div>

    <div id="appScreen" class="max-w-xl mx-auto p-4 md:p-6 pt-8 hidden">
        <header class="mb-4 flex justify-between items-start fade-in">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-slate-900">Бібліотека</h1>
                <p id="userEmailDisplay" class="text-xs text-slate-400 font-medium mt-1"></p>
            </div>
            <button id="openSettingsBtn" class="size-10 flex items-center justify-center bg-white rounded-full shadow-sm border border-slate-100 text-xl hover:bg-slate-50 active:scale-95 transition-all">⚙️</button>
        </header>

        <div id="librarySections" class="space-y-2 fade-in">
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="libraryTabs">
                <button data-tab="reading" id="tab_reading" class="library-tab active">Читаю зараз</button>
                <button data-tab="planned" id="tab_planned" class="library-tab">Хочу прочитати</button>
                <button data-tab="finished" id="tab_finished" class="library-tab">Прочитано</button>
            </div>

            <div class="flex justify-between items-center mb-2 fade-in gap-2">
                <div class="flex-1 relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔎</span>
                    <input id="libraryFilterInput" type="text" placeholder="Фільтр у бібліотеці: назва, автор, тег..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500 text-sm font-medium">
                </div>
                <div class="bg-slate-200/60 p-1 rounded-xl flex gap-1 items-center shrink-0">
                    <button id="view_list" class="view-btn active">☰ Списком</button>
                    <button id="view_grid" class="view-btn">⊞ Полицями</button>
                </div>
            </div>

            <div id="myBooksContainer" class="pb-8"></div>
        </div>

        <div id="recommendationsScreen" class="hidden flex-col h-full mt-2 fade-in">
            <div class="mb-3">
                <h2 class="text-xs font-bold uppercase text-slate-400 mb-3 ml-1 tracking-wide">Категорії</h2>
                <div class="flex gap-2 overflow-x-auto pb-3 mb-2 scrollbar-hide px-1" id="recTabs">
                    <button data-rec="auto" id="rec_auto" class="rec-tab active">✨ Для вас</button>
                    <button data-rec="Академія магії" id="rec_magic" class="rec-tab">🔮 Академія магії</button>
                    <button data-rec="Фентезі" id="rec_fantasy" class="rec-tab">Фентезі</button>
                    <button data-rec="Детектив" id="rec_detective" class="rec-tab">Детектив</button>
                    <button data-rec="Трилер" id="rec_thriller" class="rec-tab">Трилер</button>
                    <button data-rec="Романтика" id="rec_romance" class="rec-tab">Романтика</button>
                    <button data-rec="Саморозвиток" id="rec_self" class="rec-tab">Саморозвиток</button>
                    <button data-rec="Фантастика" id="rec_scifi" class="rec-tab">Фантастика</button>
                </div>

                <div class="px-1">
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🪄</span>
                        <input id="recFilterInput" type="text" placeholder="Дофільтрувати рекомендації..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500 text-sm font-medium">
                    </div>
                </div>
            </div>

            <div id="recommendationsList" class="space-y-4 pb-2 mt-2"></div>
            <div id="recLoadingState" class="py-4 text-center text-slate-400 text-sm hidden">Завантажуємо ще книги...</div>
            <div id="recScrollTarget" class="h-10 w-full pb-24"></div>
        </div>
    </div>

    <button id="searchFab" class="fixed bottom-24 right-6 z-40 size-14 bg-indigo-600 text-white rounded-full shadow-2xl shadow-indigo-300 flex items-center justify-center text-2xl hover:scale-105 active:scale-95 transition-transform duration-200 hidden">➕</button>

    <div class="backdrop fixed inset-0 z-40 bg-black/50 backdrop-blur-sm hidden" id="backdrop"></div>

    <nav id="mainBottomNav" class="bottom-nav hidden fade-in">
        <div class="max-w-xl mx-auto flex items-center justify-between px-3">
            <button data-main-tab="library" class="nav-item active"><span class="nav-icon">📚</span>Бібліотека</button>
            <button data-main-tab="recommendations" class="nav-item"><span class="nav-icon">⭐</span>Рекомендації</button>
        </div>
    </nav>

    <div id="settingsSheet" class="bottom-sheet fixed bottom-0 left-0 right-0 z-50 bg-white rounded-t-3xl shadow-2xl flex flex-col max-w-xl mx-auto p-6" style="max-height: 90vh; overflow-y: auto;">
        <div class="drag-handle w-full flex justify-center pb-4 touch-none">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
        </div>

        <h2 class="text-2xl font-bold mb-4">Налаштування</h2>

        <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4 mb-4">
            <h3 class="text-xs font-black uppercase tracking-wider text-indigo-400 mb-3">📊 Моя статистика</h3>
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-bold text-slate-700">Всього прочитано книг:</span>
                <span id="statBooks" class="text-lg font-black text-indigo-600">0</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-sm font-bold text-slate-700">Прочитано сторінок:</span>
                <span id="statPages" class="text-lg font-black text-indigo-600">0</span>
            </div>
        </div>

        <div class="space-y-3">
            <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 transition-colors">
                <span class="font-bold text-sm">Темна тема</span>
                <button id="toggleThemeBtn" class="text-2xl p-1 bg-white rounded-full shadow-sm border border-slate-200 active:scale-95 transition-transform">🌓</button>
            </div>

            <button id="exportLibraryBtn" class="w-full p-4 bg-emerald-50 text-emerald-600 font-bold text-sm rounded-2xl active:scale-95 transition-transform">📥 Експортувати бібліотеку (JSON)</button>
            <button id="clearCacheBtn" class="w-full p-4 bg-amber-50 text-amber-600 font-bold text-sm rounded-2xl active:scale-95 transition-transform">🔄 Очистити кеш (Оновити)</button>
            <button id="logoutBtn" class="w-full p-4 bg-red-50 text-red-600 font-bold text-sm rounded-2xl active:scale-95 transition-transform">🚪 Вийти з акаунту</button>
        </div>
    </div>

    <div id="readerOverlay">
        <div class="reader-controls relative">
            <button id="closeReaderBtn" class="font-bold text-red-500 bg-red-50 px-4 py-2 rounded-lg active:scale-95 transition-transform">✕ Закрити</button>

            <div class="flex flex-col items-center justify-center max-w-[50%]">
                <div id="readerTitle" class="text-xs font-bold truncate text-slate-500 w-full text-center">Назва книги</div>
                <div id="readerTimer" class="text-[10px] font-mono font-bold text-slate-400 tracking-widest mt-0.5">00:00</div>
            </div>

            <button id="readerSettingsBtn" class="font-bold text-slate-600 bg-slate-100 px-3 py-2 rounded-lg active:scale-95 transition-transform">⚙️</button>

            <div id="readerSettingsMenu" class="hidden absolute top-16 right-4 w-56 bg-white shadow-2xl rounded-2xl p-4 border border-slate-100 space-y-4 z-50 fade-in">
                <div>
                    <p class="text-[10px] font-bold uppercase text-slate-400 mb-2">Розмір тексту</p>
                    <div class="flex gap-2">
                        <button id="fontMinusBtn" class="flex-1 bg-slate-100 py-2 rounded-xl font-bold active:scale-95 text-slate-800 transition-transform">A-</button>
                        <button id="fontPlusBtn" class="flex-1 bg-slate-100 py-2 rounded-xl font-bold active:scale-95 text-slate-800 transition-transform">A+</button>
                    </div>
                </div>

                <div>
                    <p class="text-[10px] font-bold uppercase text-slate-400 mb-2">Колір сторінок</p>
                    <div class="flex gap-2 justify-between">
                        <button data-theme="light" class="reader-theme-btn size-10 rounded-full bg-[#f8fafc] border-2 border-slate-200 shadow-sm active:scale-90 transition-transform"></button>
                        <button data-theme="sepia" class="reader-theme-btn size-10 rounded-full bg-[#f4ecd8] border-2 border-slate-200 shadow-sm active:scale-90 transition-transform"></button>
                        <button data-theme="dark" class="reader-theme-btn size-10 rounded-full bg-[#0f172a] border-2 border-slate-500 shadow-sm active:scale-90 transition-transform"></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="viewer"></div>

        <div id="quotePanel" class="quote-panel hidden fade-in">
            <div class="flex items-center justify-between mb-2">
                <div class="text-[11px] font-black uppercase tracking-wider text-indigo-500">Цитата</div>
                <button id="closeQuotePanelBtn" class="text-xs font-bold text-slate-400">✕</button>
            </div>
            <textarea id="quoteText" placeholder="Виділений текст з'явиться тут або встав вручну..."></textarea>
            <div class="flex gap-2 mt-3">
                <button id="saveQuoteBtn" class="quote-save-btn flex-1">💾 Зберегти цитату</button>
                <button id="useSelectionBtn" class="flex-1 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold">↺ Взяти виділення</button>
            </div>
        </div>

        <div class="reader-controls border-t">
            <button id="readerPrevBtn" class="nav-btn">← Назад</button>
            <div id="readerProgress" class="text-[10px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 px-3 py-1.5 rounded-lg text-center min-w-[80px]">Відкриваємо...</div>
            <button id="readerNextBtn" class="nav-btn !bg-indigo-600 !text-white">Вперед →</button>
        </div>
    </div>

    <div id="searchSheet" class="bottom-sheet fixed bottom-0 left-0 right-0 z-50 bg-white rounded-t-3xl shadow-2xl flex flex-col max-w-xl mx-auto" style="height: 85vh;">
        <div class="drag-handle w-full flex justify-center pt-4 pb-3 touch-none">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
        </div>

        <div class="px-5 pb-4 shrink-0">
            <h2 class="text-xl font-bold mb-4">Знайти книгу</h2>
            <div class="search-input-wrap">
                <span class="search-input-icon">🔍</span>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Назва книги або автор..."
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="none"
                    spellcheck="false"
                    class="w-full pl-11 pr-4 py-3.5 bg-slate-100 rounded-2xl outline-none focus:bg-white focus:ring-2 ring-indigo-500 font-medium transition-all"
                >
            </div>
        </div>

        <div id="searchResults" class="px-3 pb-6 overflow-y-auto flex-1">
            <button id="manualAddBtn" class="w-[calc(100%-24px)] mx-auto mb-2 p-3 text-center text-sm font-semibold text-indigo-600 bg-indigo-50 rounded-xl active:bg-indigo-100 transition-colors">✍️ Не знайшли? Додати вручну</button>
            <div id="searchItems" class="space-y-1"></div>
        </div>
    </div>

    <div id="detailsSheet" class="bottom-sheet fixed bottom-0 left-0 right-0 z-50 bg-white rounded-t-3xl shadow-2xl flex flex-col max-w-xl mx-auto" style="max-height: 92vh;">
        <div class="drag-handle w-full flex justify-center pt-4 pb-3 touch-none cursor-grab active:cursor-grabbing">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full pointer-events-none"></div>
        </div>

        <div id="detailsContent" class="flex-1 overflow-y-auto px-6 pb-6 pt-1"></div>

        <div id="editContent" class="hidden flex-1 overflow-y-auto px-6 pb-6 pt-2 space-y-4 fade-in">
            <h3 class="text-xl font-bold mb-4">Редагувати книгу</h3>

            <input type="text" id="editTitle" placeholder="Назва" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 ring-indigo-500 font-medium">
            <input type="text" id="editAuthor" placeholder="Автор" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 ring-indigo-500 font-medium">
            <input type="number" id="editPages" placeholder="Кількість сторінок" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 ring-indigo-500 font-medium">
            <input type="url" id="editImage" placeholder="URL обкладинки" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 ring-indigo-500 font-medium text-sm">
            <input type="text" id="editTags" placeholder="Теги через кому: фентезі, магія, академія" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 ring-indigo-500 font-medium text-sm">
            <input type="number" id="editGoal" placeholder="Ціль сторінок (наприклад 300)" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 ring-indigo-500 font-medium">

            <div class="flex gap-3 mt-4">
                <button id="saveBookEditsBtn" class="flex-1 p-4 bg-indigo-600 text-white font-bold rounded-xl active:scale-95 transition-transform">Зберегти</button>
                <button id="cancelBookEditsBtn" class="flex-1 p-4 bg-slate-100 text-slate-700 font-bold rounded-xl active:scale-95 transition-transform">Скасувати</button>
            </div>
        </div>

        <div id="statusButtons" class="p-5 bg-white border-t border-slate-100 grid grid-cols-3 gap-3 shrink-0 rounded-t-2xl hidden">
            <button data-status="planned" class="status-add-btn flex flex-col items-center justify-center p-3 bg-slate-50 rounded-xl hover:bg-slate-100 active:scale-95 transition-transform text-indigo-600">
                <span class="text-xl mb-1">🕒</span>
                <span class="text-[11px] font-bold uppercase tracking-wide">В плани</span>
            </button>
            <button data-status="reading" class="status-add-btn flex flex-col items-center justify-center p-3 bg-indigo-600 text-white rounded-xl active:scale-95 transition-transform">
                <span class="text-xl mb-1">📖</span>
                <span class="text-[11px] font-bold uppercase tracking-wide">Читати</span>
            </button>
            <button data-status="finished" class="status-add-btn flex flex-col items-center justify-center p-3 bg-emerald-50 text-emerald-700 rounded-xl active:scale-95 transition-transform">
                <span class="text-xl mb-1">✅</span>
                <span class="text-[11px] font-bold uppercase tracking-wide">Прочитав</span>
            </button>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
